<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dabble | Ultra P2P</title>
    <link rel="icon" href="data:,">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg-main: #ff00ff; --bg-card: #1a1d21; --accent: #6366f1; --text-main: #f3f4f6; --success: #10b981; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .app-container { max-width: 1200px; width: 100%; display: grid; grid-template-columns: 1fr 380px; gap: 24px; }
        
        /* Video & Layout */
        .video-card { position: relative; background: #000; border-radius: 20px; overflow: hidden; border: 1px solid #2d3139; margin-bottom: 20px; min-height: 200px; }
        video { width: 100%; aspect-ratio: 16/9; display: block; object-fit: cover; }
        .panel { background: var(--bg-card); padding: 24px; border-radius: 20px; border: 1px solid #2d3139; position: relative; }
        
        /* UI Elements */
        input, select { width: 100%; padding: 12px; background: #0b0d0f; border: 1px solid #2d3139; border-radius: 10px; color: white; outline: none; box-sizing: border-box; font-family: inherit; font-size: 14px; margin-bottom: 10px;}
        input:focus, select:focus { border-color: var(--accent); }
        button { padding: 12px 20px; cursor: pointer; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: 600; transition: 0.2s; width: 100%; }
        button:hover { opacity: 0.9; }
        .btn-secondary { background: #2d3139; border: 1px solid #3f444e; }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
        .cancel-btn { background: var(--danger); padding: 6px 12px; font-size: 12px; width: auto; border-radius: 8px; margin-left: 10px;}
        .cancel-btn:hover { background: #dc2626; }
        
        /* Settings Modal */
        #settingsModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--bg-card); padding: 30px; border-radius: 20px; border: 1px solid #2d3139; width: 90%; max-width: 400px; }
        .modal-content h3 { margin-top: 0; margin-bottom: 20px; color: white; }
        .modal-content label { display: block; margin-bottom: 5px; font-size: 12px; color: #9ca3af; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Chat & Drag-n-Drop */
        #chatBox { height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 10px; border: 2px dashed transparent; border-radius: 12px; transition: 0.2s; }
        #chatBox.dragover { border-color: var(--accent); background: rgba(99, 102, 241, 0.05); }
        .msg { padding: 10px 14px; border-radius: 14px; max-width: 85%; font-size: 14px; word-wrap: break-word; }
        .msg.me { background: var(--accent); align-self: flex-end; }
        .msg.friend { background: #2d3139; align-self: flex-start; }
        .msg.sys { font-size: 11px; color: #9ca3af; align-self: center; text-transform: uppercase; text-align: center; }
        .msg a { color: #818cf8; text-decoration: none; font-weight: bold; }
        .msg a:hover { text-decoration: underline; }
        
        /* File Transfer UI */
        #fileTransferUI { display: none; padding: 12px; background: #0b0d0f; border-radius: 10px; margin-bottom: 10px; border: 1px solid #2d3139; }
        #fileTransferHeader { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        #fileTransferLabel { font-size: 12px; color: #9ca3af; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        progress { width: 100%; height: 8px; border-radius: 4px; accent-color: var(--accent); }
        progress::-webkit-progress-bar { background-color: #2d3139; border-radius: 4px; }
        progress::-webkit-progress-value { background-color: var(--accent); border-radius: 4px; }
        
        .video-overlay { position: absolute; bottom: 10px; left: 10px; z-index: 5; display: flex; gap: 8px; flex-wrap: wrap; }
        .top-right-overlay { position: absolute; top: 10px; right: 10px; z-index: 5; }
        #myIdDisplay { margin-top: 15px; font-size: 14px; color: #9ca3af; text-align: center; word-break: break-all; background: #0b0d0f; padding: 10px; border-radius: 8px; display: none; border: 1px dashed var(--accent); }
        #roomCode { letter-spacing: 4px; }
    </style>
</head>
<body>

<div id="settingsModal">
    <div class="modal-content">
        <h3>⚙️ Device Settings</h3>
        <label>Microphone</label>
        <select id="audioSource" onchange="changeDevice()"></select>
        
        <label style="margin-top: 15px;">Camera</label>
        <select id="videoSource" onchange="changeDevice()"></select>
        
        <button class="btn-secondary" style="margin-top: 20px;" onclick="toggleSettings()">Done</button>
    </div>
</div>

<div class="app-container">
    <div class="video-wall">
        <div class="video-card">
            <video id="localVideo" autoplay playsinline muted></video>
            
            <div class="top-right-overlay">
                <button class="btn-secondary" style="width:auto; padding: 8px 12px; font-size: 12px;" onclick="toggleSettings()">⚙️</button>
            </div>

            <div class="video-overlay">
                <button class="btn-secondary" style="width:auto; padding: 8px 12px; font-size: 12px;" onclick="toggleAudio()" id="micBtn">🎤 Mute</button>
                <button class="btn-secondary" style="width:auto; padding: 8px 12px; font-size: 12px;" onclick="toggleVideo()" id="camBtn">📷 Cam Off</button>
                <button class="btn-secondary" style="width:auto; padding: 8px 12px; font-size: 12px;" onclick="toggleScreenShare()" id="shareBtn">📺 Screen Share</button>
            </div>
        </div>
        <div class="video-card">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="video-overlay">
                <button class="btn-secondary" style="width:auto; padding: 8px 12px; font-size: 12px;" onclick="togglePiP('remoteVideo')" id="pipBtn">🗗 Pop Out</button>
                <button class="btn-secondary" style="width:auto; padding: 8px 12px; font-size: 12px;" onclick="goFullscreen('remoteVideo')">⛶ Fullscreen</button>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="panel">
            <input type="text" id="peerIdInput" placeholder="Enter a 6-digit Room ID..." style="text-align: center; font-family: monospace; letter-spacing: 2px;">
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button onclick="hostRoom()">1. Create Room</button>
                <button class="btn-secondary" onclick="joinRoom()">2. Join Room</button>
            </div>

            <div id="myIdDisplay">
                Your Room ID:<br>
                <strong id="roomCode" style="font-size:24px; color:white; display:block; margin-top:5px; user-select:all;">Loading...</strong>
            </div>
        </div>

        <div class="panel" style="margin-top:20px;">
            <div id="fileTransferUI">
                <div id="fileTransferHeader">
                    <div id="fileTransferLabel">Transferring...</div>
                    <button class="cancel-btn" onclick="cancelTransfer()">Cancel</button>
                </div>
                <progress id="fileProgress" value="0" max="100"></progress>
            </div>
            <div id="chatBox"><div class="msg sys">Welcome to Dabble. Connecting to server...</div></div>
            <input type="text" id="chatInput" placeholder="Type a message..." style="margin-bottom:0; text-align:left; font-family:inherit;">
        </div>
    </div>
</div>

<script>
    let localStream = new MediaStream(), currentCall, dataConn, screenStream;
    let connectionTimeout;
    
    const shortRoomId = Math.floor(100000 + Math.random() * 900000).toString();
    
   let peer = new Peer(shortRoomId, {
        host: '0.peerjs.com',
        port: 443,
        secure: true,
        pingInterval: 5000,
        config: {
            'iceServers': [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        }
    });

    let isAudioMuted = false;
    let isVideoOff = false;

    // File Transfer Variables
    const CHUNK_SIZE = 65536; 
    let fileQueue = [];
    let incomingFileInfo = null;
    let incomingFileData = [];
    let receivedSize = 0;
    let isSendingFile = false;
    let cancelTransferFlag = false; 
    
    // Notification & Throttling Variables
    let unreadCount = 0;
    const originalTitle = "Dabble | Ultra P2P";
    let lastReceiveUpdate = 0; 

    // --- Media Initialization & Fallbacks ---
    function createDummyVideoTrack() {
        const canvas = document.createElement('canvas');
        canvas.width = 1; canvas.height = 1;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, 1, 1);
        return canvas.captureStream(1).getVideoTracks()[0];
    }

    async function initMedia() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: { ideal: 1920 }, height: { ideal: 1080 } }, 
                audio: true 
            });
            document.getElementById('localVideo').srcObject = localStream;
        } catch (e) { 
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                localStream.addTrack(createDummyVideoTrack());
                addChatMessage("sys", "Camera blocked. Audio active."); 
            } catch (e2) {
                localStream = new MediaStream([createDummyVideoTrack()]);
                addChatMessage("sys", "Camera & Mic blocked. You can still chat/share screen."); 
            }
        }
        
        if (navigator.mediaDevices.enumerateDevices) loadDevices();
        setupDragAndDrop();
        requestNotificationPermission();
    }

    // --- Settings & Device Management ---
    function toggleSettings() {
        const modal = document.getElementById('settingsModal');
        modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
    }

    async function loadDevices() {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const audioSelect = document.getElementById('audioSource');
        const videoSelect = document.getElementById('videoSource');
        
        audioSelect.innerHTML = '';
        videoSelect.innerHTML = '';

        devices.forEach(device => {
            const option = document.createElement('option');
            option.value = device.deviceId;
            if (device.kind === 'audioinput') {
                option.text = device.label || `Microphone ${audioSelect.length + 1}`;
                audioSelect.appendChild(option);
            } else if (device.kind === 'videoinput') {
                option.text = device.label || `Camera ${videoSelect.length + 1}`;
                videoSelect.appendChild(option);
            }
        });
    }

    async function changeDevice() {
        const audioId = document.getElementById('audioSource').value;
        const videoId = document.getElementById('videoSource').value;
        
        if (localStream) localStream.getTracks().forEach(track => track.stop());

        localStream = await navigator.mediaDevices.getUserMedia({
            audio: { deviceId: audioId ? { exact: audioId } : undefined },
            video: { 
                deviceId: videoId ? { exact: videoId } : undefined,
                width: { ideal: 1920 }, height: { ideal: 1080 }
            }
        });

        if (!screenStream) document.getElementById('localVideo').srcObject = localStream;

        if (currentCall && currentCall.peerConnection) {
            const audioSender = currentCall.peerConnection.getSenders().find(s => s.track && s.track.kind === 'audio');
            const videoSender = currentCall.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
            if (audioSender) audioSender.replaceTrack(localStream.getAudioTracks()[0]);
            if (videoSender && !screenStream) videoSender.replaceTrack(localStream.getVideoTracks()[0]);
        }

        isAudioMuted = false;
        isVideoOff = false;
        document.getElementById('micBtn').innerText = "🎤 Mute";
        document.getElementById('micBtn').classList.replace('btn-danger', 'btn-secondary');
        document.getElementById('camBtn').innerText = "📷 Cam Off";
        document.getElementById('camBtn').classList.replace('btn-danger', 'btn-secondary');
    }

    // --- Notifications Logic ---
    function requestNotificationPermission() {
        if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") Notification.requestPermission();
    }

    function triggerNotification(title, body) {
        if (document.hidden) {
            unreadCount++;
            document.title = `(${unreadCount}) New ${title}!`;
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification(`Dabble: New ${title}`, { body: body, icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50" fill="%236366f1"/></svg>' });
            }
        }
    }

    document.addEventListener("visibilitychange", () => {
        if (!document.hidden) { unreadCount = 0; document.title = originalTitle; }
    });

    // --- PeerJS Signaling Events ---
    peer.on('open', id => {
        document.getElementById('roomCode').innerText = id;
        addChatMessage("sys", "Ready! Create a room or join one.");
    });

    peer.on('error', err => { 
        if (err.type === 'unavailable-id') alert("Room ID collision! Please refresh.");
        else addChatMessage("sys", `Server Error: ${err.type}`); 
    });

    // --- Host & Join Logic ---
    function hostRoom() {
        document.getElementById('myIdDisplay').style.display = 'block';
        addChatMessage("sys", "Waiting for someone to join using your Room ID...");
        requestNotificationPermission();

        peer.on('connection', conn => { 
            dataConn = conn; 
            setupDataHandlers(); 
        });
        
        peer.on('call', call => {
            currentCall = call;
            call.answer(localStream);
            handleMediaStream(call);
        });
    }

    function joinRoom() {
        const hostId = document.getElementById('peerIdInput').value.trim();
        if(!hostId) return alert("Please enter the Room ID first!");
        addChatMessage("sys", "Connecting to room...");
        requestNotificationPermission();

        connectionTimeout = setTimeout(() => {
            addChatMessage("sys", "Connection timed out. Ensure the host is still on the page and try again.");
        }, 10000);

        dataConn = peer.connect(hostId);
        
        dataConn.on('error', (err) => {
            clearTimeout(connectionTimeout);
            addChatMessage("sys", `Connection failed: ${err}`);
        });

        setupDataHandlers();

        currentCall = peer.call(hostId, localStream);
        handleMediaStream(currentCall);
    }

    // FIX: Stops the AbortError by only injecting the stream once
    function handleMediaStream(call) {
        call.on('stream', remoteStream => { 
            const remoteVid = document.getElementById('remoteVideo');
            if (remoteVid.srcObject !== remoteStream) {
                addChatMessage("sys", "Video Stream Connected!");
                remoteVid.srcObject = remoteStream; 
                
                // Play explicitly, but safely
                if (remoteVid.paused) {
                    remoteVid.play().catch(e => console.log("Autoplay blocked, user interaction needed.", e));
                }
            }
        });
    }

    // --- Media Controls ---
    function toggleAudio() {
        if (localStream && localStream.getAudioTracks().length > 0) {
            isAudioMuted = !isAudioMuted;
            localStream.getAudioTracks()[0].enabled = !isAudioMuted;
            const btn = document.getElementById('micBtn');
            btn.innerText = isAudioMuted ? "🔇 Unmute" : "🎤 Mute";
            btn.classList.toggle('btn-danger', isAudioMuted);
            btn.classList.toggle('btn-secondary', !isAudioMuted);
        }
    }

    function toggleVideo() {
        if (localStream && localStream.getVideoTracks().length > 0) {
            isVideoOff = !isVideoOff;
            localStream.getVideoTracks()[0].enabled = !isVideoOff;
            const btn = document.getElementById('camBtn');
            btn.innerText = isVideoOff ? "🚫 Cam On" : "📷 Cam Off";
            btn.classList.toggle('btn-danger', isVideoOff);
            btn.classList.toggle('btn-secondary', !isVideoOff);
        }
    }

    // FIX: Removed manual resolution/bitrate forcing to allow safe native capture
    async function toggleScreenShare() {
        if (!screenStream) {
            try {
                // Request native screen capture with high FPS preference
                screenStream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: { frameRate: { ideal: 60, max: 120 } }, 
                    audio: true 
                });
                
                const videoTrack = screenStream.getVideoTracks()[0];
                videoTrack.contentHint = 'detail'; // Keep text sharp
                
                if (currentCall && currentCall.peerConnection) {
                    const sender = currentCall.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                    if (sender) {
                        await sender.replaceTrack(videoTrack);
                    }
                }
                
                document.getElementById('localVideo').srcObject = screenStream;
                document.getElementById('shareBtn').innerText = "🛑 Stop Sharing";
                document.getElementById('shareBtn').classList.replace('btn-secondary', 'btn-success');
                videoTrack.onended = () => { toggleScreenShare(); };
            } catch (e) { addChatMessage("sys", "Screen share canceled or error."); }
        } else {
            if (currentCall && currentCall.peerConnection) {
                const sender = currentCall.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                if (sender && localStream.getVideoTracks().length > 0) sender.replaceTrack(localStream.getVideoTracks()[0]);
            }
            document.getElementById('localVideo').srcObject = localStream;
            screenStream.getTracks().forEach(t => t.stop());
            screenStream = null;
            document.getElementById('shareBtn').innerText = "📺 Screen Share";
            document.getElementById('shareBtn').classList.replace('btn-success', 'btn-secondary');
            if (isVideoOff && localStream.getVideoTracks().length > 0) localStream.getVideoTracks()[0].enabled = false;
        }
    }

    function goFullscreen(id) { document.getElementById(id).requestFullscreen(); }

    async function togglePiP(id) {
        const video = document.getElementById(id);
        if (document.pictureInPictureElement) await document.exitPictureInPicture();
        else {
            if (document.pictureInPictureEnabled) {
                try { await video.requestPictureInPicture(); } catch (err) { addChatMessage("sys", "Pop-out failed."); }
            } else addChatMessage("sys", "Pop-out not supported.");
        }
    }

    document.getElementById('remoteVideo').addEventListener('enterpictureinpicture', () => {
        const btn = document.getElementById('pipBtn');
        if(btn) { btn.innerText = "🗗 Bring Back"; btn.classList.replace('btn-secondary', 'btn-success'); }
    });
    
    document.getElementById('remoteVideo').addEventListener('leavepictureinpicture', () => {
        const btn = document.getElementById('pipBtn');
        if(btn) { btn.innerText = "🗗 Pop Out"; btn.classList.replace('btn-success', 'btn-secondary'); }
    });

    // --- Data Channel & Messaging ---
    function setupDataHandlers() {
        dataConn.on('open', () => {
            clearTimeout(connectionTimeout); 
            addChatMessage("sys", "Handshake Complete! Connection is live.");
            document.getElementById('myIdDisplay').style.display = 'none';
        });
        
        dataConn.on('data', data => {
            if (typeof data === 'string') {
                const d = JSON.parse(data);
                if (d.type === 'chat') {
                    addChatMessage("friend", d.text);
                    triggerNotification('Message', d.text); 
                } else if (d.type === 'file-start') {
                    incomingFileInfo = d;
                    incomingFileData = [];
                    receivedSize = 0;
                    document.getElementById('fileTransferUI').style.display = 'block';
                    document.getElementById('fileTransferLabel').innerText = `Receiving: ${d.name}`;
                    document.getElementById('fileProgress').max = d.size;
                    document.getElementById('fileProgress').value = 0;
                    triggerNotification('File Transfer', `Receiving ${d.name}`); 
                } else if (d.type === 'file-cancel') {
                    addChatMessage("sys", "The sender canceled the file transfer.");
                    resetFileTransferUI();
                } else if (d.type === 'file-cancel-request') {
                    cancelTransferFlag = true;
                    addChatMessage("sys", "The recipient canceled the download.");
                }
            } else if (data instanceof ArrayBuffer || data instanceof Uint8Array) {
                incomingFileData.push(data);
                receivedSize += data.byteLength;
                
                const now = Date.now();
                if (now - lastReceiveUpdate > 50 || receivedSize >= incomingFileInfo.size) {
                    document.getElementById('fileProgress').value = receivedSize;
                    lastReceiveUpdate = now;
                }

                if (receivedSize >= incomingFileInfo.size) {
                    const blob = new Blob(incomingFileData);
                    const url = URL.createObjectURL(blob);
                    addChatMessage("friend", `📁 <a href="${url}" download="${incomingFileInfo.name}">Download ${incomingFileInfo.name}</a>`);
                    resetFileTransferUI();
                }
            }
        });
    }

    function sendMessage() {
        const i = document.getElementById('chatInput');
        if (dataConn && dataConn.open && i.value.trim() !== "") {
            dataConn.send(JSON.stringify({ type: 'chat', text: i.value }));
            addChatMessage("me", i.value);
            i.value = "";
        }
    }
    document.getElementById('chatInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

    // --- Sequential File Queue & Cancel ---
    function setupDragAndDrop() {
        const chatBox = document.getElementById('chatBox');
        chatBox.addEventListener('dragover', e => { e.preventDefault(); chatBox.classList.add('dragover'); });
        chatBox.addEventListener('dragleave', e => { e.preventDefault(); chatBox.classList.remove('dragover'); });

        chatBox.addEventListener('drop', e => {
            e.preventDefault();
            chatBox.classList.remove('dragover');
            
            if (!dataConn || !dataConn.open) return addChatMessage("sys", "Connect to a peer to send files!");

            if (e.dataTransfer.files.length > 0) {
                for (let i = 0; i < e.dataTransfer.files.length; i++) fileQueue.push(e.dataTransfer.files[i]);
                if (e.dataTransfer.files.length > 1) addChatMessage("sys", `Queued ${e.dataTransfer.files.length} files.`);
                if (!isSendingFile && !incomingFileInfo) processFileQueue();
            }
        });
    }

    function processFileQueue() {
        if (fileQueue.length === 0) {
            isSendingFile = false;
            setTimeout(() => { if(!isSendingFile) document.getElementById('fileTransferUI').style.display = 'none'; }, 1000);
            return;
        }

        let file = fileQueue.shift(); 
        isSendingFile = true;
        cancelTransferFlag = false;
        
        let lastSendUpdate = 0; 
        
        document.getElementById('fileTransferUI').style.display = 'block';
        
        let labelText = `Sending: ${file.name}`;
        if (fileQueue.length > 0) labelText += ` (+${fileQueue.length} in queue)`;
        document.getElementById('fileTransferLabel').innerText = labelText;
        
        const progress = document.getElementById('fileProgress');
        progress.max = file.size;
        progress.value = 0;

        dataConn.send(JSON.stringify({ type: 'file-start', name: file.name, size: file.size }));

        let offset = 0;
        
        const readNextChunk = () => {
            if (cancelTransferFlag) {
                dataConn.send(JSON.stringify({ type: 'file-cancel' }));
                fileQueue = []; 
                resetFileTransferUI();
                return; 
            }

            const slice = file.slice(offset, offset + CHUNK_SIZE);
            const reader = new FileReader();
            
            reader.onload = e => {
                dataConn.send(e.target.result);
                offset += e.target.result.byteLength;
                
                const now = Date.now();
                if (now - lastSendUpdate > 50 || offset >= file.size) {
                    progress.value = offset;
                    lastSendUpdate = now;
                }

                if (offset < file.size) {
                    if(dataConn.dataChannel && dataConn.dataChannel.bufferedAmount > 2000000) setTimeout(readNextChunk, 50);
                    else readNextChunk();
                } else {
                    addChatMessage("me", `Sent file: ${file.name}`);
                    processFileQueue(); 
                }
            };
            reader.readAsArrayBuffer(slice);
        };
        readNextChunk();
    }

    function cancelTransfer() {
        if (isSendingFile) {
            cancelTransferFlag = true;
            fileQueue = []; 
            addChatMessage("sys", "You canceled the upload and cleared the queue.");
        } else if (incomingFileInfo) {
            dataConn.send(JSON.stringify({ type: 'file-cancel-request' }));
            addChatMessage("sys", "You canceled the download.");
            resetFileTransferUI();
        }
    }

    function resetFileTransferUI() {
        document.getElementById('fileTransferUI').style.display = 'none';
        incomingFileInfo = null;
        incomingFileData = [];
        receivedSize = 0;
        isSendingFile = false;
        cancelTransferFlag = false;
    }

    function addChatMessage(s, m) {
        const b = document.getElementById('chatBox');
        b.innerHTML += `<div class="msg ${s}">${m}</div>`;
        b.scrollTop = b.scrollHeight;
    }

    initMedia();
</script>
</body>
</html>
