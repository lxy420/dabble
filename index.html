<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .video-container { display: flex; gap: 20px; justify-content: center; margin-top: 20px; }
        video { width: 45%; background: #000; border-radius: 10px; border: 2px solid #333; }
        .controls { margin-bottom: 30px; background: #1e1e1e; padding: 20px; border-radius: 15px; display: inline-block; }
        input { padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; background: #6366f1; color: white; margin: 5px; }
        button:disabled { background: #444; }
        .status { color: #10b981; margin: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Dabble Simple P2P</h2>
    
    <div class="controls">
        <div id="setup-id">
            <p>Your ID: <strong id="my-id">...</strong></p>
            <input type="text" id="remote-id" placeholder="Enter Peer ID">
            <button onclick="connectToPeer()">Connect</button>
        </div>
        <div id="status" class="status">Waiting for connection...</div>
        <button id="screen-btn" onclick="toggleScreen()" disabled>📺 Share Screen</button>
    </div>

    <div class="video-container">
        <div><p>Local</p><video id="localVideo" autoplay muted playsinline></video></div>
        <div><p>Remote</p><video id="remoteVideo" autoplay playsinline></video></div>
    </div>

<script>
    let peer = new Peer();
    let localStream;
    let screenStream;
    let currentCall;

    // 1. Get Microphone on startup
    navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then(stream => {
        localStream = stream;
        document.getElementById('status').innerText = "Mic Ready. Ready to connect.";
    });

    // 2. PeerJS Setup
    peer.on('open', id => { document.getElementById('my-id').innerText = id; });

    // Handle Incoming Calls
    peer.on('call', call => {
        currentCall = call;
        call.answer(localStream);
        handleCall(call);
    });

    // 3. Connect to a Peer
    function connectToPeer() {
        const id = document.getElementById('remote-id').value;
        if (!id) return alert("Enter ID");
        
        currentCall = peer.call(id, localStream);
        handleCall(currentCall);
    }

    function handleCall(call) {
        document.getElementById('status').innerText = "Connected!";
        document.getElementById('screen-btn').disabled = false;

        call.on('stream', remoteStream => {
            const remoteVideo = document.getElementById('remoteVideo');
            remoteVideo.srcObject = remoteStream;
        });

        call.on('close', () => {
            alert("Peer disconnected");
            location.reload();
        });
    }

    // 4. Toggle Screen Share (The "Simple" way)
    async function toggleScreen() {
        if (!screenStream) {
            // Start Sharing
            screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            const videoTrack = screenStream.getVideoTracks()[0];
            
            // Add video track to the existing call
            const sender = currentCall.peerConnection.getSenders().find(s => s.track?.kind === 'video');
            
            if (sender) {
                sender.replaceTrack(videoTrack);
            } else {
                // If no video sender exists, we add it
                currentCall.peerConnection.addTrack(videoTrack, localStream);
            }

            document.getElementById('localVideo').srcObject = screenStream;
            document.getElementById('screen-btn').innerText = "🛑 Stop Sharing";

            videoTrack.onended = () => toggleScreen();
        } else {
            // Stop Sharing
            screenStream.getTracks().forEach(t => t.stop());
            screenStream = null;
            
            const sender = currentCall.peerConnection.getSenders().find(s => s.track?.kind === 'video');
            if (sender) currentCall.peerConnection.removeTrack(sender);
            
            document.getElementById('localVideo').srcObject = null;
            document.getElementById('screen-btn').innerText = "📺 Share Screen";
        }
    }
</script>
</body>
</html>
